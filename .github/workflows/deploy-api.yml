name: Deploy API to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=raw,value=${{ github.sha }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_PRIVATE_KEY }}
          envs: REGISTRY,IMAGE_NAME,IMAGE_TAG,GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            echo "Starting deployment..."
            
            LOWERCASE_IMAGE_NAME=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
            REGISTRY_URL="$REGISTRY/$LOWERCASE_IMAGE_NAME"
            
            echo "$GITHUB_TOKEN" | docker login $REGISTRY -u $GITHUB_ACTOR --password-stdin
            
            docker pull $REGISTRY_URL:$IMAGE_TAG
            
            docker stop ezcheckin-api || true
            docker rm ezcheckin-api || true
            
            # Khởi chạy container mới với việc mount file env vào thẳng ruột app
            docker run -d \
              --name ezcheckin-api \
              --restart unless-stopped \
              -p 3000:3000 \
              --env-file ~/.env_ezcheckin \
              -v ~/.env_ezcheckin:/app/.env \
              -v ezcheckin-api-logs:/app/logs \
              $REGISTRY_URL:$IMAGE_TAG
            
            echo "Deployment completed successfully!"
            
            sleep 5
            if docker ps | grep ezcheckin-api > /dev/null; then
              echo "✅ Container is running!"
            else
              echo "❌ Container failed to start. Logs:"
              docker logs ezcheckin-api | tail -20
              exit 1
            fi