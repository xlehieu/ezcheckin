version: '3.8'

services:
  mongo-tx:
    image: mongo:7.0
    container_name: local_mongo_tx
    command: ['--replSet', 'rs0', '--bind_ip_all', '--port', '27017']
    ports:
      - '27018:27017'
    volumes:
      - local_mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: local_redis
    ports:
      - '6379:6379'
    volumes:
      - local_redis_data:/data
    command: redis-server --appendonly yes

  # api:
