version: '3.8'

services:
  mongo:
    image: mongo:7.0
    container_name: ez_mongo
    restart: always
    command: ['--replSet', 'rs0', '--bind_ip_all', '--port', '27017']
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ ping: 1 })'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: ez_redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ez_api
    restart: always

    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

    ports:
      - '3000:3000'

    env_file:
      - .env

    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/ezcheckin_local?replicaSet=rs0&directConnection=true
      REDIS_URL: redis://redis:6379

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mongo_data:
  redis_data: